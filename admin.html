<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexHack Panel - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0f; --surface: #1a1a25; --surface2: #222230; --text: #fff; --text-muted: #a0a0b0; --accent: #7850ff; --border: #2a2a3a; --success: #22c55e; --error: #ef4444; --warning: #f59e0b; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    nav { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 16px 40px; background: rgba(10,10,15,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); border-radius: 0 0 20px 20px; z-index: 1000; }
    .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #7850ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-links { display: flex; gap: 20px; list-style: none; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 500; padding: 8px 16px; border-radius: 8px; transition: all 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }
    .admin-badge { background: var(--warning); color: black; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-left: 10px; }
    .btn { padding: 10px 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); text-decoration: none; font-size: 14px; cursor: pointer; transition: all 0.3s; }
    .btn:hover { border-color: var(--accent); }
    .btn-approve { background: var(--success); border-color: var(--success); color: white; }
    .btn-approve:hover { background: #16a34a; }
    .btn-reject, .btn-delete { background: var(--error); border-color: var(--error); color: white; }
    .btn-reject:hover, .btn-delete:hover { background: #dc2626; }
    .btn-add { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-add:hover { background: #6b4ce6; }
    .btn-edit { background: #3b82f6; border-color: #3b82f6; color: white; }
    .btn-edit:hover { background: #2563eb; }
    header { padding: 100px 40px 30px; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 5px; }
    .subtitle { color: var(--text-muted); margin-bottom: 20px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 40px 40px; }
    .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
    .stat-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 30px; text-align: center; }
    .stat-number { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-label { color: var(--text-muted); font-size: 13px; margin-top: 5px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .tab { padding: 12px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); cursor: pointer; transition: all 0.3s; }
    .tab:hover, .tab.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    /* Cards */
    .section { display: none; }
    .section.active { display: block; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-title { font-size: 20px; font-weight: 700; }
    
    /* Pending Users */
    .pending-grid { display: grid; gap: 20px; }
    .pending-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; }
    .pending-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .pending-user { font-size: 18px; font-weight: 700; }
    .pending-date { color: var(--text-muted); font-size: 14px; }
    .pending-screenshots { display: flex; gap: 15px; margin: 15px 0; }
    .screenshot { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px; flex: 1; }
    .screenshot-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .screenshot img { width: 100%; border-radius: 8px; max-height: 200px; object-fit: contain; }
    .pending-actions { display: flex; gap: 10px; margin-top: 15px; }
    
    /* Plugins */
    .plugins-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
    .plugin-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: all 0.3s; }
    .plugin-card:hover { border-color: var(--accent); }
    .plugin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .plugin-name { font-size: 18px; font-weight: 700; }
    .plugin-code { background: var(--accent); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .plugin-desc { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin: 10px 0; }
    .plugin-link { color: var(--accent); font-size: 12px; word-break: break-all; }
    .plugin-actions { display: flex; gap: 8px; margin-top: 15px; }
    
    /* Users List */
    .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
    .user-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; position: relative; }
    .user-name { font-weight: 600; margin-bottom: 5px; }
    .user-date { font-size: 12px; color: var(--text-muted); }
    .user-delete { position: absolute; top: 10px; right: 10px; background: var(--error); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 12px; }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; max-width: 500px; width: 90%; }
    .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
    .modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
    input, textarea { width: 100%; padding: 12px 16px; background: var(--bg); border: 2px solid var(--border); border-radius: 10px; color: white; font-size: 14px; margin-bottom: 15px; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    
    .empty { text-align: center; padding: 40px; color: var(--text-muted); background: var(--surface); border-radius: 16px; }
    
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .pending-screenshots { flex-direction: column; }
      .plugins-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">VexHack <span class="admin-badge">👑 ADMIN</span></div>
    <ul class="nav-links">
      <li><a href="#" class="active" onclick="showSection('pending')">Oczekujący</a></li>
      <li><a href="#" onclick="showSection('plugins')">Pluginy</a></li>
      <li><a href="#" onclick="showSection('users')">Użytkownicy</a></li>
    </ul>
    <div class="nav-right">
      <button class="btn" onclick="logout()">Wyloguj</button>
    </div>
  </nav>

  <header>
    <h1>Panel Admina</h1>
    <p class="subtitle">Zarządzaj użytkownikami i pluginami</p>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-item">
        <div class="stat-number" id="pendingCount">0</div>
        <div class="stat-label">Oczekujących</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="usersCount">0</div>
        <div class="stat-label">Użytkowników</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="pluginsCount">0</div>
        <div class="stat-label">Pluginów</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="showSection('pending')">📋 Oczekujący</button>
      <button class="tab" onclick="showSection('plugins')">📦 Pluginy</button>
      <button class="tab" onclick="showSection('users')">👥 Użytkownicy</button>
    </div>

    <!-- Pending Section -->
    <div id="pendingSection" class="section active">
      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 Oczekujące rejestracje</span>
        </div>
        <div class="pending-grid" id="pendingGrid"></div>
      </div>
    </div>

    <!-- Plugins Section -->
    <div id="pluginsSection" class="section">
      <div class="card">
        <div class="card-header">
          <span class="card-title">📦 Zarządzanie pluginami</span>
          <button class="btn btn-add" onclick="openAddPluginModal()">➕ Dodaj plugin</button>
        </div>
        <div class="plugins-grid" id="pluginsGrid"></div>
      </div>
    </div>

    <!-- Users Section -->
    <div id="usersSection" class="section">
      <div class="card">
        <div class="card-header">
          <span class="card-title">👥 Zatwierdzeni użytkownicy</span>
        </div>
        <div class="users-grid" id="usersGrid"></div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Plugin Modal -->
  <div class="modal" id="pluginModal">
    <div class="modal-content">
      <button class="modal-close" onclick="closePluginModal()">×</button>
      <div class="modal-title" id="modalTitle">➕ Dodaj plugin</div>
      
      <input type="hidden" id="editPluginId">
      
      <label>Nazwa pluginu:</label>
      <input type="text" id="pluginName" placeholder="Nazwa pluginu">
      
      <label>Opis:</label>
      <textarea id="pluginDescription" placeholder="Opis pluginu..."></textarea>
      
      <label>Link do pobrania:</label>
      <input type="text" id="pluginLink" placeholder="https://...">
      
      <label>Kod:</label>
      <input type="text" id="pluginCode" placeholder="Kod (opcjonalnie)">
      
      <div class="modal-actions">
        <button class="btn btn-add" onclick="savePlugin()">💾 Zapisz</button>
        <button class="btn" onclick="closePluginModal()">Anuluj</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    const ADMIN_PASS = 'vexhack2026';
    
    function checkAuth() {
      const user = JSON.parse(localStorage.getItem('vexpanel_user') || '{}');
      if (!user.token || !user.isAdmin) {
        window.location.href = 'login.html';
        return;
      }
      loadAll();
    }
    
    function logout() {
      localStorage.removeItem('vexpanel_user');
      window.location.href = 'login.html';
    }
    
    function showSection(section) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(section + 'Section').classList.add('active');
      event.target.classList.add('active');
    }
    
    async function loadAll() {
      await loadPending();
      await loadPlugins();
      await loadUsers();
    }
    
    async function loadPending() {
      try {
        const response = await fetch(API_URL + '/pending');
        const pending = await response.json();
        document.getElementById('pendingCount').textContent = pending.length;
        
        const grid = document.getElementById('pendingGrid');
        if (pending.length === 0) {
          grid.innerHTML = '<div class="empty">🎉 Brak oczekujących rejestracji!</div>';
          return;
        }
        
        grid.innerHTML = pending.map(u => `
          <div class="pending-card">
            <div class="pending-header">
              <span class="pending-user">👤 ${u.username}</span>
              <span class="pending-date">${new Date(u.createdAt).toLocaleString('pl-PL')}</span>
            </div>
            <div class="pending-screenshots">
              <div class="screenshot">
                <div class="screenshot-label">📷 Screenshot #1</div>
                <img src="${u.screenshots[0] || ''}" alt="Screen 1" onerror="this.style.display='none'">
              </div>
              <div class="screenshot">
                <div class="screenshot-label">📷 Screenshot #2</div>
                <img src="${u.screenshots[1] || ''}" alt="Screen 2" onerror="this.style.display='none'">
              </div>
            </div>
            <div class="pending-actions">
              <button class="btn btn-approve" onclick="approveUser(${u.id})">✅ Akceptuj</button>
              <button class="btn btn-reject" onclick="rejectUser(${u.id})">❌ Odrzuć</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Błąd:', error);
      }
    }
    
    async function loadPlugins() {
      try {
        const response = await fetch(API_URL + '/plugins');
        const plugins = await response.json();
        document.getElementById('pluginsCount').textContent = plugins.length;
        
        const grid = document.getElementById('pluginsGrid');
        
        if (plugins.length === 0) {
          grid.innerHTML = '<div class="empty">Brak pluginów. Dodaj pierwszy!</div>';
          return;
        }
        
        grid.innerHTML = plugins.map(p => `
          <div class="plugin-card">
            <div class="plugin-header">
              <span class="plugin-name">${p.name}</span>
              <span class="plugin-code">${p.code || 'N/A'}</span>
            </div>
            <p class="plugin-desc">${p.description || 'Brak opisu'}</p>
            <div class="plugin-link">🔗 ${p.link || 'Brak linku'}</div>
            <div class="plugin-actions">
              <button class="btn btn-edit" onclick="editPlugin('${p.id}')">✏️ Edytuj</button>
              <button class="btn btn-delete" onclick="deletePlugin('${p.id}')">🗑️ Usuń</button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Błąd:', error);
      }
    }
    
    async function loadUsers() {
      try {
        const response = await fetch(API_URL + '/users');
        const users = await response.json();
        document.getElementById('usersCount').textContent = users.length;
        
        const grid = document.getElementById('usersGrid');
        
        if (users.length === 0) {
          grid.innerHTML = '<div class="empty">Brak zatwierdzonych użytkowników</div>';
          return;
        }
        
        grid.innerHTML = users.map(u => `
          <div class="user-card">
            <button class="user-delete" onclick="deleteUser(${u.id})">×</button>
            <div class="user-name">👤 ${u.username}</div>
            <div class="user-date">Od: ${new Date(u.approvedAt).toLocaleDateString('pl-PL')}</div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Błąd:', error);
      }
    }
    
    // ========== USER ACTIONS ==========
    async function approveUser(userId) {
      try {
        const response = await fetch(API_URL + '/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, adminPassword: ADMIN_PASS })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('✅ Użytkownik zatwierdzony!');
          loadAll();
        } else {
          alert('❌ Błąd: ' + data.error);
        }
      } catch (error) {
        alert('❌ Błąd połączenia!');
      }
    }
    
    async function rejectUser(userId) {
      if (!confirm('Na pewno chcesz odrzucić tego użytkownika?')) return;
      
      try {
        const response = await fetch(API_URL + '/reject', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, adminPassword: ADMIN_PASS })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('❌ Użytkownik odrzucony');
          loadAll();
        }
      } catch (error) {
        alert('❌ Błąd połączenia!');
      }
    }
    
    async function deleteUser(userId) {
      if (!confirm('Na pewno chcesz usunąć tego użytkownika?')) return;
      
      try {
        const response = await fetch(API_URL + '/users/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, adminPassword: ADMIN_PASS })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('✅ Użytkownik usunięty!');
          loadAll();
        }
      } catch (error) {
        alert('❌ Błąd połączenia!');
      }
    }
    
    // ========== PLUGIN ACTIONS ==========
    function openAddPluginModal() {
      document.getElementById('modalTitle').textContent = '➕ Dodaj plugin';
      document.getElementById('editPluginId').value = '';
      document.getElementById('pluginName').value = '';
      document.getElementById('pluginDescription').value = '';
      document.getElementById('pluginLink').value = '';
      document.getElementById('pluginCode').value = '';
      document.getElementById('pluginModal').classList.add('show');
    }
    
    function editPlugin(pluginId) {
      fetch(API_URL + '/plugins')
        .then(r => r.json())
        .then(plugins => {
          const plugin = plugins.find(p => p.id === pluginId);
          if (plugin) {
            document.getElementById('modalTitle').textContent = '✏️ Edytuj plugin';
            document.getElementById('editPluginId').value = plugin.id;
            document.getElementById('pluginName').value = plugin.name;
            document.getElementById('pluginDescription').value = plugin.description || '';
            document.getElementById('pluginLink').value = plugin.link || '';
            document.getElementById('pluginCode').value = plugin.code || '';
            document.getElementById('pluginModal').classList.add('show');
          }
        });
    }
    
    function closePluginModal() {
      document.getElementById('pluginModal').classList.remove('show');
    }
    
    async function savePlugin() {
      const editId = document.getElementById('editPluginId').value;
      const name = document.getElementById('pluginName').value.trim();
      const description = document.getElementById('pluginDescription').value.trim();
      const link = document.getElementById('pluginLink').value.trim();
      const code = document.getElementById('pluginCode').value.trim();
      
      if (!name) {
        alert('Nazwa jest wymagana!');
        return;
      }
      
      try {
        const url = editId ? API_URL + '/plugins/update' : API_URL + '/plugins/add';
        const body = {
          adminPassword: ADMIN_PASS,
          name,
          description,
          link,
          code
        };
        
        if (editId) {
          body.pluginId = editId;
        }
        
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('✅ ' + data.message);
          closePluginModal();
          loadPlugins();
        } else {
          alert('❌ Błąd: ' + data.error);
        }
      } catch (error) {
        alert('❌ Błąd połączenia!');
      }
    }
    
    async function deletePlugin(pluginId) {
      if (!confirm('Na pewno chcesz usunąć ten plugin?')) return;
      
      try {
        const response = await fetch(API_URL + '/plugins/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pluginId, adminPassword: ADMIN_PASS })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('✅ Plugin usunięty!');
          loadPlugins();
        }
      } catch (error) {
        alert('❌ Błąd połączenia!');
      }
    }
    
    checkAuth();
  </script>
</body>
</html>
