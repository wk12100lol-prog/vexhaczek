<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexHack - Połącz z Discord</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0a0a0f; --surface:#1a1a25; --text:#fff; --text-muted:#a0a0b0; --accent:#7850ff; --success:#22c55e; --error:#ef4444; --border:#2a2a3a; }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .container { max-width:450px; width:100%; background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:40px; text-align:center; }
    .logo { font-size:32px; font-weight:800; background:linear-gradient(135deg,#7850ff,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:10px; }
    h1 { font-size:22px; margin-bottom:10px; }
    p { color:var(--text-muted); margin-bottom:25px; line-height:1.6; font-size:14px; }
    .icon { font-size:60px; margin-bottom:15px; }
    .steps { text-align:left; margin-bottom:25px; }
    .step { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; padding:12px; background:rgba(120,80,255,0.08); border-radius:10px; }
    .step-num { background:var(--accent); color:white; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
    .step-text { font-size:14px; color:var(--text-muted); }
    .step-text strong { color:var(--text); }
    .step-text code { background:rgba(120,80,255,0.2); padding:2px 8px; border-radius:6px; color:white; font-weight:700; }
    input { width:100%; padding:16px; background:var(--bg); border:2px solid var(--border); border-radius:12px; color:white; font-size:22px; font-family:monospace; text-align:center; letter-spacing:6px; transition:border-color 0.3s; }
    input:focus { outline:none; border-color:var(--accent); }
    input::placeholder { color:var(--text-muted); font-size:14px; letter-spacing:normal; }
    button { width:100%; padding:16px; background:linear-gradient(135deg,#5865F2,#4752C4); border:none; border-radius:12px; color:white; font-size:16px; font-weight:600; cursor:pointer; transition:all 0.3s; margin-top:12px; }
    button:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(88,101,242,0.4); }
    button:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .message { padding:14px; border-radius:10px; margin-top:12px; font-size:14px; display:none; }
    .message.success { background:rgba(34,197,94,0.15); border:1px solid var(--success); color:var(--success); }
    .message.error { background:rgba(239,68,68,0.15); border:1px solid var(--error); color:var(--error); }
    .back { margin-top:20px; color:var(--text-muted); text-decoration:none; font-size:14px; }
    .back:hover { color:var(--accent); }
    .divider { display:flex; align-items:center; gap:15px; margin:20px 0; color:var(--text-muted); font-size:13px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .link { margin-top:15px; color:var(--text-muted); font-size:14px; }
    .link a { color:var(--accent); text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💬</div>
    <div class="logo">VexHack</div>
    <h1>Logowanie przez Discord</h1>
    <p>Masz rolę na serwerze VexHack? Użyj kodu z Discorda!</p>
    
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">Na Discordzie wpisz <code>!połącz</code></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">Bot wyśle Ci <strong>6-cyfrowy kod</strong></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">Wpisz kod poniżej i kliknij <strong>Zweryfikuj</strong></div>
      </div>
    </div>
    
    <input type="text" id="codeInput" placeholder="• • • • • •" maxlength="6" autocomplete="off">
    <button id="verifyBtn" onclick="verifyCode()">🔐 Zweryfikuj</button>
    <div class="message" id="message"></div>
    
    <div class="divider">lub</div>
    
    <a href="login.html" style="display:block; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:12px; color:var(--text); text-decoration:none; transition:border-color 0.3s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      🔑 Zaloguj się przez konto
    </a>
    
    <div class="link">
      Nie masz konta? <a href="register.html">Zarejestruj się</a>
    </div>
  </div>

  <script>
    async function verifyCode() {
      const code = document.getElementById('codeInput').value.trim();
      const btn = document.getElementById('verifyBtn');
      const msg = document.getElementById('message');
      
      if (code.length !== 6 || !/^\d+$/.test(code)) {
        msg.className = 'message error';
        msg.textContent = 'Kod musi mieć 6 cyfr!';
        msg.style.display = 'block';
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Weryfikacja...';
      msg.style.display = 'none';
      
      try {
        const response = await fetch('/api/discord/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('vexpanel_user', JSON.stringify({
            isAdmin: false,
            discordId: data.discordId,
            username: data.discordUsername,
            token: 'discord_' + data.discordId,
            discordVerified: true
          }));
          
          msg.className = 'message success';
          msg.textContent = '✅ ' + data.message;
          
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
        } else {
          msg.className = 'message error';
          msg.textContent = '❌ ' + (data.error || 'Nieprawidłowy kod!');
          msg.style.display = 'block';
        }
      } catch (error) {
        msg.className = 'message error';
        msg.textContent = '❌ Błąd połączenia z serwerem!';
        msg.style.display = 'block';
      }
      
      btn.disabled = false;
      btn.textContent = '🔐 Zweryfikuj';
    }
    
    document.getElementById('codeInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') verifyCode();
    });
  </script>
</body>
</html>
