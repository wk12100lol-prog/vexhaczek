<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexHack Panel - Strona główna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0f; --surface: #1a1a25; --text: #fff; --text-muted: #a0a0b0; --accent: #7850ff; --border: #2a2a3a; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .container { max-width: 600px; width: 100%; text-align: center; }
    .logo { font-size: 64px; font-weight: 800; background: linear-gradient(135deg, #7850ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .subtitle { font-size: 24px; color: var(--text-muted); margin-bottom: 40px; }
    .features { display: grid; gap: 20px; margin-bottom: 40px; }
    .feature { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; text-align: left; display: flex; align-items: center; gap: 20px; }
    .feature-icon { font-size: 40px; }
    .feature-title { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
    .feature-desc { color: var(--text-muted); font-size: 14px; }
    .buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .btn { padding: 16px 40px; border-radius: 12px; font-size: 16px; font-weight: 600; text-decoration: none; transition: all 0.3s; }
    .btn-primary { background: linear-gradient(135deg, #7850ff, #a855f7); color: white; }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(120,80,255,0.4); }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { border-color: var(--accent); }
    footer { margin-top: 40px; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">VexHack</div>
    <p class="subtitle">Panel z pluginami Minecraft</p>
    
    <div class="features">
      <div class="feature">
        <span class="feature-icon">📦</span>
        <div>
          <div class="feature-title">30+ Pluginów</div>
          <div class="feature-desc">Skrypty i pluginy do Minecraft</div>
        </div>
      </div>
      <div class="feature">
        <span class="feature-icon">🔒</span>
        <div>
          <div class="feature-title">Bezpieczne konto</div>
          <div class="feature-desc">Weryfikacja przez screenery</div>
        </div>
      </div>
      <div class="feature">
        <span class="feature-icon">⬇️</span>
        <div>
          <div class="feature-title">Darmowe pobieranie</div>
          <div class="feature-desc">Wszystkie pluginy są darmowe</div>
        </div>
      </div>
    </div>
    
    <div class="buttons">
      <a href="register.html" class="btn btn-primary">📝 Zarejestruj się</a>
      <a href="login.html" class="btn btn-secondary">🔐 Zaloguj się</a>
    </div>
    
    <footer>
      © 2026 VexHack. Wszelkie prawa zastrzeżone.
    </footer>
  </div>
</body>
</html>
